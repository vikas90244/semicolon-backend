services:
  # Web Service (Django Backend)
  - type: web
    name: semicolon-backend
    env: docker
    dockerfilePath: ./Dockerfile
    region: singapore # Change to your preferred region
    plan: free
    healthCheckPath: /health/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: semicolon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: semicolon-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://semicolon-chi.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://semicolon-chi.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://semicolon-chi.vercel.app
      # These will be auto-filled after deployment
      - key: BACKEND_URL
        value: https://semicolon-backend.onrender.com
      - key: ALLOWED_HOSTS
        value: semicolon-backend.onrender.com

databases:
  # PostgreSQL Database
  - name: semicolon-db
    databaseName: semicolon
    user: semicolon
    plan: free
    region: singapore # Same region as web service

# Redis is added separately through Render dashboard
